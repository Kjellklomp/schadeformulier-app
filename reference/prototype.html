<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schadeformulier Snelinvuller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root{
    --navy:#182849; --navy-2:#22345c;
    --paper:#F6F4EF; --paper-2:#ffffff;
    --amber:#D98E2B; --amber-deep:#B9701A;
    --green:#3F7A5C; --red:#B5432F;
    --line:#DCD6C7; --ink:#182233; --ink-soft:#5B6272;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:720px; margin:0 auto; padding:20px 16px 80px;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; margin:0 0 6px; color:var(--navy); letter-spacing:-0.01em;}
  .brandbar{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .brand-mark{width:34px;height:34px;border-radius:8px;background:var(--navy); display:flex;align-items:center;justify-content:center; color:var(--amber); font-family:'Space Grotesk'; font-weight:700; font-size:16px; flex-shrink:0;}
  .brand-name{font-family:'Space Grotesk'; font-weight:600; font-size:15px; color:var(--navy);}
  .brand-sub{font-size:11.5px; color:var(--ink-soft);}

  .chiprow{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px;}
  .chip{background:#fff; border:1px solid var(--line); border-radius:999px; padding:6px 11px; font-size:11.5px; font-weight:600; color:var(--navy-2); display:flex; align-items:center; gap:5px;}

  .progress{display:flex; gap:6px; margin:0 0 22px;}
  .progress .seg{flex:1; height:5px; border-radius:3px; background:var(--line); transition:background .25s;}
  .progress .seg.done{background:var(--navy);}
  .progress .seg.active{background:var(--amber);}
  .step-label{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--amber-deep); font-weight:600; margin-bottom:4px;}

  .card{background:var(--paper-2); border:1px solid var(--line); border-radius:14px; padding:22px 20px; margin-bottom:16px;}
  .card p.desc{color:var(--ink-soft); font-size:14px; line-height:1.5; margin:4px 0 18px;}

  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink); margin:14px 0 5px;}
  label.req::after{content:" *"; color:var(--red);}
  input[type=text], input[type=tel], input[type=email], input[type=date], textarea, select{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:9px;
    font-family:'Inter'; font-size:14.5px; background:#FBFAF7; color:var(--ink);
  }
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--amber); background:#fff;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 12px;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  .row-btns{display:flex; gap:10px; margin-top:22px;}
  button{font-family:'Inter'; font-weight:600; font-size:14.5px; border-radius:9px; padding:12px 18px; border:none; cursor:pointer; transition:transform .08s, filter .15s;}
  button:active{transform:scale(0.98);}
  .btn-primary{background:var(--navy); color:#fff; flex:1;}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-primary:disabled{background:#9aa3b5; cursor:not-allowed;}
  .btn-ghost{background:transparent; color:var(--navy); border:1.5px solid var(--line);}
  .btn-ghost:hover{border-color:var(--navy);}
  .btn-amber{background:var(--amber); color:#fff;}
  .btn-amber:hover{filter:brightness(1.08);}
  .btn-sm{padding:8px 12px; font-size:13px;}

  .upload-box{border:1.5px dashed var(--line); border-radius:12px; padding:18px; text-align:center; cursor:pointer; background:#FBFAF7; margin-top:6px; transition:border-color .15s;}
  .upload-box:hover{border-color:var(--amber);}
  .upload-box.filled{border-style:solid; border-color:var(--green); background:#F1F7F3;}
  .upload-box .icon{font-size:22px; margin-bottom:4px;}
  .upload-box .hint{font-size:12px; color:var(--ink-soft); margin-top:3px;}
  .thumb-row{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .thumb-row img{width:70px; height:48px; object-fit:cover; border-radius:6px; border:1px solid var(--line);}

  .status-line{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); margin-top:10px;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--line); flex-shrink:0;}
  .dot.busy{background:var(--amber); animation:pulse 1s infinite;}
  .dot.ok{background:var(--green);}
  .dot.err{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .mic-btn{display:inline-flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--line); border-radius:999px; padding:9px 16px; font-size:13.5px; font-weight:600; color:var(--navy); cursor:pointer;}
  .mic-btn.recording{background:var(--red); color:#fff; border-color:var(--red);}
  .mic-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
  .mic-btn.recording .mic-dot{background:#fff; animation:pulse .8s infinite;}

  .extract-summary{background:#F1F7F3; border:1px solid #cfe4d7; border-radius:10px; padding:12px 14px; font-size:13px; color:#204634; margin-top:12px; line-height:1.5;}
  .extract-summary b{color:var(--green);}
  .conflict-box{background:#FBEDEA; border:1px solid #ecc3ba; border-radius:10px; padding:12px 14px; font-size:13px; color:#7a2c1c; margin-top:12px; line-height:1.5;}
  .conflict-box b{color:var(--red);}
  .rdw-box{background:#EEF2FA; border:1px solid #cdd8ef; border-radius:10px; padding:12px 14px; font-size:13px; color:#1f3560; margin-top:10px; line-height:1.6;}
  .rdw-box.mismatch{background:#FBEDEA; border-color:#ecc3ba; color:#7a2c1c;}
  .rdw-box b{color:var(--navy);}

  .doc-replica{background:#fff; border-radius:10px; overflow:hidden; border:1px solid var(--line);}
  .doc-head{background:var(--navy); color:#fff; padding:12px 16px; font-family:'Space Grotesk'; font-size:13px; letter-spacing:.03em; display:flex; justify-content:space-between; align-items:center;}
  .doc-head.b{background:var(--amber-deep);}
  .doc-body{padding:2px 0;}
  .doc-field{display:flex; justify-content:space-between; gap:10px; padding:9px 16px; border-bottom:1px solid #EFEBE0; font-size:13.5px;}
  .doc-field:last-child{border-bottom:none;}
  .doc-field .k{color:var(--ink-soft); flex-shrink:0; width:44%;}
  .doc-field .v{font-weight:600; text-align:right; font-family:'IBM Plex Mono'; font-size:12.8px; color:var(--ink);}
  .doc-field .v.empty{color:var(--red); font-family:'Inter'; font-weight:500; font-style:italic;}
  .doc-section-title{background:#F6F4EF; padding:7px 16px; font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--amber-deep); font-weight:700;}

  .warn-box{background:#FBF1EA; border:1px solid #EFD8C0; border-radius:10px; padding:12px 14px; font-size:12.8px; color:#7A4A1E; margin-top:14px; line-height:1.5;}
  .timer-badge{display:inline-block; background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:4px 11px; font-size:12px; color:var(--ink-soft); font-weight:600;}
  .footer-note{text-align:center; font-size:11.5px; color:var(--ink-soft); margin-top:22px; line-height:1.6;}

  .qr-wrap{display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px 10px; background:#FBFAF7; border:1px solid var(--line); border-radius:12px; margin-top:10px;}
  .qr-wrap img{border-radius:8px; border:1px solid var(--line);}
  .session-code{font-family:'IBM Plex Mono'; font-size:22px; font-weight:600; letter-spacing:.1em; color:var(--navy); background:#fff; padding:8px 16px; border-radius:8px; border:1.5px dashed var(--line);}
  .waiting-pulse{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); margin-top:8px;}

  .partner-thank{text-align:center; padding:40px 20px;}
  .partner-thank .big{font-size:42px; margin-bottom:10px;}

  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    .card{border:none; padding:0;}
    .wrap{max-width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brandbar no-print">
    <div class="brand-mark">EU</div>
    <div>
      <div class="brand-name">Schadeformulier Snelinvuller</div>
      <div class="brand-sub">Prototype — vult jouw kant automatisch in, checkt live bij de RDW, en synct met de tegenpartij</div>
    </div>
  </div>

  <div class="chiprow no-print" id="chiprow"></div>

  <div class="progress no-print" id="progress"></div>

  <div id="app"></div>

  <div class="footer-note no-print">
    Prototype ter validatie. Gegevens blijven lokaal en in een gedeelde sessie tot je ze exporteert — geen permanente serveropslag van persoonsgegevens buiten deze demo.
  </div>
</div>

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=> res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function callClaude({system, userContent, imageBlocks}){
  const content = [];
  if(imageBlocks){
    imageBlocks.forEach(b => content.push({type:"image", source:{type:"base64", media_type:b.mediaType, data:b.data}}));
  }
  content.push({type:"text", text:userContent});
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model: ANTHROPIC_MODEL, max_tokens: 1000, system, messages:[{role:"user", content}] })
  });
  const data = await res.json();
  return (data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("\n");
}

function parseJSONLoose(text){
  let t = text.trim().replace(/^```json/,'').replace(/^```/,'').replace(/```$/,'').trim();
  try{ return JSON.parse(t); } catch(e){
    const m = t.match(/\{[\s\S]*\}/);
    if(m){ try{ return JSON.parse(m[0]); }catch(e2){} }
    return null;
  }
}

    const seg = el(`<div class="seg ${i<state.step?'done':(i===state.step?'active':'')}"></div>`);
    p.appendChild(seg);
  }
}

function render(){
  if(isPartnerRole){
    document.getElementById('chiprow').style.display='none';
    document.getElementById('progress').style.display='none';
    const app = document.getElementById('app');
    app.innerHTML = "";
    app.appendChild(renderPartnerFlow());
    return;
  }
  chipRow();
  progressBar();
  const app = document.getElementById('app');
  app.innerHTML = "";
  if(state.step===1) app.appendChild(renderStep1());
  if(state.step===2) app.appendChild(renderStep2());
  if(state.step===3) app.appendChild(renderStep3_Samen());
  if(state.step===4) app.appendChild(renderStep4_Toedracht());
  if(state.step===5) app.appendChild(renderStep5_Overzicht());
}

async function runRijbewijsOCR(cardEl, files){
  const status = cardEl.querySelector('#rstatus');
  setStatus(status, 'busy', 'Rijbewijs uitlezen…');
  try{
    const imageBlocks = [{mediaType: files[0].type||'image/jpeg', data: await fileToBase64(files[0])}];
    const system = `Je bent een OCR-assistent voor een Europees (NL/BE) rijbewijs. Lees de afbeelding en geef ALLEEN geldig JSON terug, niets anders, met exact deze velden:
{"achternaam":"...", "voornaam":"...", "geboortedatum":"YYYY-MM-DD", "documentnummer":"...", "categorie":"...", "geldig_tot":"YYYY-MM-DD"}
Documentnummer staat meestal bij veld 5. Categorie bij veld 9 (bv. AM, B, B/E — geef als komma-gescheiden lijst indien meerdere). Geldig tot staat meestal bij veld 4b. Gebruik lege string "" als een veld niet leesbaar is.`;
    const text = await callClaude({system, userContent:"Lees dit rijbewijs uit en geef het JSON-object.", imageBlocks});
    const data = parseJSONLoose(text);
    if(!data) throw new Error("parse-fout");
    // autofill velden in de DOM
    if(data.achternaam) cardEl.querySelector('#naam').value = data.achternaam;
    if(data.voornaam) cardEl.querySelector('#voornaam').value = data.voornaam;
    if(data.geboortedatum) cardEl.querySelector('#geboortedatum').value = data.geboortedatum;
    if(data.documentnummer) cardEl.querySelector('#rijbewijsnr').value = data.documentnummer;
    if(data.categorie) cardEl.querySelector('#categorie').value = data.categorie;
    if(data.geldig_tot) cardEl.querySelector('#geldigtot').value = data.geldig_tot;
    state.rijbewijs.status = 'ok';
    setStatus(status, 'ok', `Herkend: <b>${data.achternaam||'?'} ${data.voornaam||''}</b> — rijbewijsnr. ${data.documentnummer||'?'}`);
  }catch(err){
    state.rijbewijs.status = 'err';
    setStatus(status, 'err', 'Kon rijbewijs niet automatisch lezen — vul de velden hieronder handmatig in.');
  }
}

function renderThumbs(container, files){

function setStatus(node, kind, text){

function summarizeKenteken(d){ return `Herkend: <b>${d.merk||'?'} ${d.handelsbenaming||d.type||''}</b> · kenteken <b>${d.kenteken||'?'}</b>`; }
function summarizeVerzekering(d){ return `Herkend: <b>${d.maatschappij||'?'}</b> · polis <b>${d.polisnr||'?'}</b>`; }

async function runKentekenOCR(cardEl, files){
  const status = cardEl.querySelector('#kstatus');
  setStatus(status, 'busy', 'Gegevens uitlezen…');
  try{
    const imageBlocks = [];
    for(const f of files) imageBlocks.push({mediaType: f.type||'image/jpeg', data: await fileToBase64(f)});
    const system = `Je bent een OCR-assistent voor een Nederlands kentekenbewijs (RDW). Lees de afbeelding(en) en geef ALLEEN geldig JSON terug, niets anders, met exact deze velden:
{"kenteken":"...", "merk":"...", "type":"...", "handelsbenaming":"...", "land":"Nederland", "voertuigidentificatienummer":"..."}
Gebruik lege string "" als een veld niet leesbaar is. Kenteken zonder streepjes, in hoofdletters (bv AB123C).`;
    const text = await callClaude({system, userContent:"Lees dit kentekenbewijs uit en geef het JSON-object.", imageBlocks});
    const data = parseJSONLoose(text);
    if(!data) throw new Error("parse-fout");
    state.kenteken.data = data;
    state.kenteken.status = 'ok';
    setStatus(status, 'ok', summarizeKenteken(data));
    await runRdwCheck(cardEl, data);
  }catch(err){
    state.kenteken.status = 'err';
    setStatus(status, 'err', 'Kon gegevens niet automatisch lezen — vul aan bij het overzicht.');
  }
}

async function runRdwCheck(cardEl, kentekenData){
  const box = cardEl.querySelector('#rdwbox');
  state.kenteken.rdw.status = 'busy';
  box.innerHTML = `<div class="status-line"><div class="dot busy"></div><div>Live checken bij RDW open data…</div></div>`;
  try{
    const rec = await rdwLookup(kentekenData.kenteken);
    if(!rec){
      state.kenteken.rdw = {status:'notfound', data:null, mismatch:false};
      box.innerHTML = `<div class="status-line"><div class="dot err"></div><div>Kenteken niet gevonden in RDW open data — controleer het kenteken.</div></div>`;
      return;
    }
    const merkMatch = !kentekenData.merk || (rec.merk||'').toUpperCase().includes(kentekenData.merk.toUpperCase().slice(0,4));
    const mismatch = !merkMatch;
    state.kenteken.rdw = {status:'ok', data:rec, mismatch};
    renderRdwBox(box, state.kenteken.rdw);
  }catch(err){
    state.kenteken.rdw = {status:'err', data:null, mismatch:false};
    box.innerHTML = `<div class="status-line"><div class="dot err"></div><div>RDW-check niet gelukt (geen verbinding) — ga verder zonder live check.</div></div>`;
  }
}

function renderRdwBox(box, rdw){
  if(rdw.status==='ok' && rdw.data){
    const d = rdw.data;
    box.innerHTML = `
      <div class="rdw-box ${rdw.mismatch?'mismatch':''}">
        ${rdw.mismatch ? '⚠️ <b>Let op:</b> merk op je documentfoto komt niet duidelijk overeen met het RDW-register — controleer het kenteken.<br>' : '✅ <b>Live bevestigd bij RDW:</b><br>'}
        ${d.merk||'-'} ${d.handelsbenaming||''} · kleur ${d.eerste_kleur||'-'} · ${d.voertuigsoort||'-'}<br>
        <span style="font-size:11.5px; opacity:.8;">Bron: opendata.rdw.nl, kenteken ${d.kenteken}</span>
      </div>`;
  }
}

let pollTimer = null;

function renderStep3_Samen(){
  if(!state.sessionId) state.sessionId = genSessionId();
  const link = window.location.origin + window.location.pathname + '?s=' + state.sessionId;
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(link)}`;

  const c = el(`

        </div>
      </div>

      <div class="row-btns no-print">
        <button class="btn-ghost" id="back3">← Terug</button>
        <button class="btn-ghost" id="skip3" style="flex:1;">Overslaan — vul dit later handmatig aan</button>

  c.querySelector('#next3').addEventListener('click', ()=>{ stopPolling(); state.step=4; render(); });

  if(state.partner.status==='ok'){
    showPartnerResult(c);
  } else {

  }

function startPolling(cardEl){
  stopPolling();
  pollTimer = setInterval(async ()=>{
    try{
      const result = await window.storage.get('session:'+state.sessionId+':B', true);
      if(result && result.value){
        stopPolling();
        state.partner.status = 'ok';
        state.partner.data = JSON.parse(result.value);
        showPartnerResult(cardEl);
      }
    }catch(e){ /* key nog niet gezet, blijf pollen */ }
  }, 3500);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

function showPartnerResult(cardEl){
  const waitline = cardEl.querySelector('#waitline');
  if(waitline) waitline.innerHTML = `<div class="dot ok"></div><div>Gegevens ontvangen ✓</div>`;
  const p = state.partner.data;
  cardEl.querySelector('#partnerresult').innerHTML = `

}

/* ================= STEP 4: toedracht (spraak/tekst + conflictcheck) ================= */
let recognition = null;
let recognizing = false;

function renderStep4_Toedracht(){
  const c = el(`
    <div class="card">
      <div class="step-label no-print">Stap 4 van 5</div>
      <h2>Wat is er gebeurd?</h2>
      <p class="desc">Spreek in of typ in je eigen woorden wat er gebeurde. Hoe meer detail, hoe beter het formulier wordt ingevuld.</p>

      <div class="no-print" style="margin-bottom:10px;">
        <button class="mic-btn" id="micbtn"><span class="mic-dot"></span><span id="miclabel">Inspreken</span></button>
      </div>
      <textarea id="toedracht" rows="7" placeholder="Bijvoorbeeld: Vandaag rond 14:30 op de Grote Markt in Antwerpen. Ik stond stil voor een verkeerslicht toen de andere auto van achteren tegen mijn bumper reed. Geen gewonden. Schade aan mijn achterbumper.">${state.toedracht.text}</textarea>

      <div class="status-line" id="tstatus"></div>

      <div class="row-btns no-print">
        <button class="btn-ghost" id="back4">← Terug</button>
        <button class="btn-amber" id="analyze4" style="flex:1;">Analyseer met AI →</button>
      </div>
      <div id="tresult"></div>
      <div id="conflictresult"></div>

      <div class="row-btns no-print" style="margin-top:8px;">
        <button class="btn-primary" id="next4" ${state.toedracht.data?'':'disabled'}>Volgende: overzicht →</button>
      </div>
    </div>
  `);

  const micbtn = c.querySelector('#micbtn');
  const ta = c.querySelector('#toedracht');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ micbtn.style.display = 'none'; }
  else {
    micbtn.addEventListener('click', ()=>{
      if(recognizing){ recognition && recognition.stop(); return; }
      recognition = new SR();
      recognition.lang = 'nl-NL'; recognition.continuous = true; recognition.interimResults = false;
      recognition.onstart = ()=>{ recognizing=true; micbtn.classList.add('recording'); c.querySelector('#miclabel').textContent='Stop opname'; };
      recognition.onend = ()=>{ recognizing=false; micbtn.classList.remove('recording'); c.querySelector('#miclabel').textContent='Inspreken'; };
      recognition.onerror = ()=>{ recognizing=false; micbtn.classList.remove('recording'); c.querySelector('#miclabel').textContent='Inspreken'; };
      recognition.onresult = (event)=>{
        let transcript = '';
        for(let i=event.resultIndex;i<event.results.length;i++) transcript += event.results[i][0].transcript;
        ta.value = (ta.value ? ta.value+' ' : '') + transcript;
        state.toedracht.text = ta.value;
      };
      recognition.start();
    });
  }

  c.querySelector('#back4').addEventListener('click', ()=>{ state.step=3; render(); });
  c.querySelector('#next4').addEventListener('click', ()=>{ state.step=5; render(); });

  c.querySelector('#analyze4').addEventListener('click', async ()=>{
    state.toedracht.text = ta.value;
    if(!state.toedracht.text.trim()){ alert("Beschrijf eerst kort wat er gebeurde."); return; }
    const status = c.querySelector('#tstatus');
    setStatus(status, 'busy', 'Toedracht analyseren…');
    try{
      const system = `Je helpt bij het invullen van het Europese schadeformulier. Op basis van de vrije beschrijving van de bestuurder van "Voertuig A", geef ALLEEN geldig JSON terug met exact deze velden:
{
 "datum": "YYYY-MM-DD of leeg", "tijd": "HH:MM of leeg", "plaats": "...", "straat": "...", "land": "...",
 "gewonden": "ja"|"nee"|"onbekend",
 "materiele_schade_andere_voertuigen": "ja"|"nee"|"onbekend",
 "materiele_schade_andere_objecten": "ja"|"nee"|"onbekend",
 "zichtbare_schade_A": "korte beschrijving van de zichtbare schade aan voertuig A",
 "opmerkingen": "neutrale, feitelijke samenvatting van de toedracht in 2-4 zinnen",
 "toedracht_vakjes_A": [getallen 1-17 die vermoedelijk van toepassing zijn op voertuig A],
 "toedracht_toelichting": "één zin uitleg + waarschuwing dit ter plaatse te verifiëren",
 "schets": {
   "mogelijk": true|false,
   "wegtype": "rechte_weg"|"kruising"|"rotonde"|"parkeerplaats"|"onbekend",
   "positie_A": "midden"|"links"|"rechts"|"geparkeerd",
   "richting_A": "boven"|"onder"|"links"|"rechts"|"stilstaand",
   "positie_B": "midden"|"links"|"rechts"|"geparkeerd",
   "richting_B": "boven"|"onder"|"links"|"rechts"|"stilstaand",
   "botspunt": "voor"|"achter"|"links"|"rechts"|"zijkant_links"|"zijkant_rechts",
   "opmerking_schets": "één korte zin die uitlegt wat de schets toont"
 }
}
De 17 standaardomschrijvingen: 1 stond geparkeerd/stil, 2 verliet parkeerplaats/opende deur, 3 ging parkeren, 4 reed weg van/op parkeerplaats-inrit, 5 reed op parkeerplaats-inrit-onverharde weg, 6 wilde rotonde oprijden, 7 reed op rotonde, 8 botste op achterzijde zelfde rijstrook, 9 reed in zelfde richting andere rijstrook, 10 veranderde van rijstrook, 11 haalde in, 12 ging rechtsaf, 13 ging linksaf, 14 reed achteruit, 15 kwam op rijbaan tegemoetkomend verkeer, 16 kwam van rechts op kruising, 17 lette niet op voorrangsteken/rood licht.
Wees terughoudend: kies alleen vakjes waar de tekst duidelijk op wijst.
Voor "schets": zet "mogelijk" op false als de tekst te vaag of te complex is om een simpele, betrouwbare schematische bovenaanzicht-tekening van te maken (bijvoorbeeld bij meerdere voertuigen, onduidelijke wegsituatie, of tegenstrijdige details) — wees hier liever te voorzichtig dan te stellig, een verkeerde schets is erger dan geen schets.`;
      const text = await callClaude({system, userContent: state.toedracht.text});
      const data = parseJSONLoose(text);
      if(!data) throw new Error("parse-fout");
      state.toedracht.data = data;
      state.toedracht.status = 'ok';
      setStatus(status, 'ok', 'Toedracht geanalyseerd.');
      renderToedrachtSummary(c, data);
      c.querySelector('#next4').disabled = false;

      if(state.partner.status==='ok' && state.partner.data && state.partner.data.toedracht){
        await runConflictCheck(c, data.opmerkingen, state.partner.data.toedracht);
      }
    }catch(err){
      setStatus(status, 'err', 'Analyse mislukt — probeer opnieuw of vul stap 5 handmatig aan.');
    }
  });

  if(state.toedracht.data) renderToedrachtSummary(c, state.toedracht.data);
  return c;
}

async function runConflictCheck(cardEl, textA, textB){
  const box = cardEl.querySelector('#conflictresult');
  box.innerHTML = `<div class="status-line"><div class="dot busy"></div><div>Verklaringen van beide partijen vergelijken…</div></div>`;
  try{
    const system = `Je vergelijkt twee onafhankelijke verklaringen over dezelfde verkeersaanrijding — één van bestuurder A, één van bestuurder B. Geef ALLEEN geldig JSON terug:
{"consistent": true|false, "toelichting": "korte, neutrale uitleg in 1-2 zinnen", "aandachtspunten": ["korte losse punten waar de verklaringen verschillen, max 3"]}
Wees feitelijk en neutraal, beschuldig niemand, en focus alleen op concrete tegenstrijdigheden (bv. wie stilstond, wie van richting veranderde, wie inhaalde).`;
    const text = await callClaude({system, userContent:`Verklaring A: ${textA}\n\nVerklaring B: ${textB}`});
    const data = parseJSONLoose(text);
    if(!data) throw new Error("parse-fout");
    if(data.consistent){
      box.innerHTML = `<div class="extract-summary"><b>✓ Consistent:</b> ${data.toelichting||'Geen tegenstrijdigheden gevonden tussen beide verklaringen.'}</div>`;
    } else {
      box.innerHTML = `<div class="conflict-box"><b>⚠️ Mogelijke tegenstrijdigheid:</b> ${data.toelichting||''}${(data.aandachtspunten&&data.aandachtspunten.length)?('<ul style="margin:6px 0 0 18px; padding:0;">'+data.aandachtspunten.map(a=>`<li>${a}</li>`).join('')+'</ul>'):''}<br><span style="font-size:11.5px;">Bespreek dit samen vóórdat jullie ondertekenen (vak 15).</span></div>`;
    }
  }catch(err){
    box.innerHTML = '';
  }
}

/* ================= Situatieschets: eenvoudige AI-gestuurde schematische tekening ================= */
function generateSchetsDataUrl(schets){
  // Canvas op schaal van SCHETS_BOX (351 x 151 pt) x 4 voor scherpte
  const W = 351*4, H = 151*4;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#9aa3b0'; ctx.lineWidth = 3;
  ctx.fillStyle = '#33415c';
  ctx.font = 'bold 26px Arial';

  function road(){
    ctx.fillStyle = '#e9ecf1';
    if(schets.wegtype==='kruising'){
      ctx.fillRect(W/2-70,0,140,H);
      ctx.fillRect(0,H/2-70,W,140);
    } else if(schets.wegtype==='rotonde'){
      ctx.fillRect(0,H/2-70,W,140);
      ctx.beginPath(); ctx.arc(W/2,H/2,80,0,Math.PI*2); ctx.fillStyle='#dfe3ea'; ctx.fill();
      ctx.strokeStyle='#b7bec9'; ctx.stroke();
    } else if(schets.wegtype==='parkeerplaats'){
      ctx.fillRect(0,0,W,H);
      ctx.strokeStyle = '#c7cdd6'; ctx.lineWidth=2;
      for(let x=40;x<W;x+=70){ ctx.beginPath(); ctx.moveTo(x,20); ctx.lineTo(x,H-20); ctx.stroke(); }
    } else {
      ctx.fillRect(0,H/2-70,W,140);
      ctx.strokeStyle='#c7cdd6'; ctx.setLineDash([14,10]); ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  function carPos(pos, isA){
    const laneOffset = 34;
    let cx = isA ? W*0.32 : W*0.68;
    let cy = H/2;
    if(schets.wegtype==='kruising'){ cx = isA ? W/2 : W/2; cy = isA? H*0.68 : H*0.32; }
    if(pos==='links') cy -= laneOffset;
    if(pos==='rechts') cy += laneOffset;
    if(pos==='geparkeerd'){ cx = isA? W*0.18 : W*0.82; cy = H*0.18; }
    return {cx,cy};
  }
  function drawCar(cx, cy, richting, label, color){
    ctx.save();
    let angle = 0;
    if(richting==='boven') angle = -Math.PI/2;
    if(richting==='onder') angle = Math.PI/2;
    if(richting==='links') angle = Math.PI;
    if(richting==='rechts') angle = 0;
    ctx.translate(cx,cy); ctx.rotate(angle);
    ctx.fillStyle = color; ctx.strokeStyle='#20304f'; ctx.lineWidth=3;
    const w=64,h=30;
    ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-w/2,-h/2,w,h,6) : ctx.rect(-w/2,-h/2,w,h);
    ctx.fill(); ctx.stroke();
    if(richting!=='stilstaand'){
      ctx.beginPath();
      ctx.moveTo(w/2,0); ctx.lineTo(w/2-14,-10); ctx.lineTo(w/2-14,10); ctx.closePath();
      ctx.fillStyle = '#20304f'; ctx.fill();
    }
    ctx.restore();
    ctx.fillStyle = '#12213f';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign='center';
    ctx.fillText(label, cx, cy - 26);
  }
  road();
  const a = carPos(schets.positie_A, true);
  const b = carPos(schets.positie_B, false);
  drawCar(a.cx, a.cy, schets.richting_A, 'A', '#3a5aa6');
  drawCar(b.cx, b.cy, schets.richting_B, 'B', '#c9832f');
  // botspunt
  const midx = (a.cx+b.cx)/2, midy = (a.cy+b.cy)/2;
  ctx.strokeStyle = '#B5432F'; ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(midx-12,midy-12); ctx.lineTo(midx+12,midy+12);
  ctx.moveTo(midx+12,midy-12); ctx.lineTo(midx-12,midy+12);
  ctx.stroke();
  return cv.toDataURL('image/png');
}

async function buildFilledPdf(){
  const { PDFDocument, StandardFonts, rgb } = PDFLib;
  const bytes = Uint8Array.from(atob(PDF_TEMPLATE_B64), c=>c.charCodeAt(0));
  const pdfDoc = await PDFDocument.load(bytes);
  const page = pdfDoc.getPages()[0];
  const font = await pdfDoc.embedFont(StandardFonts.Helvetica);

  const p = state.person, vn = state.vn.zelfde ? p : state.vn;
  const k = state.kenteken.data || {}, v = state.verzekering.data || {}, t = state.toedracht.data || {};

  function draw(key, value, opts){
    if(!value) return;
    const c = FIELD_COORDS[key]; if(!c) return;
    page.drawText(String(value), {
      x: c.x, y: toPdfY(c.yBottom),
      size: (opts&&opts.size) || c.size || 9,
      font, color: rgb(0.09,0.16,0.29)
    });
  }
  function checkX(coord){
    if(!coord) return;
    page.drawText('X', { x: coord.x, y: toPdfY(coord.y, 2), size: 10, font, color: rgb(0.71,0.26,0.18) });
  }
  function wrapDraw(text, keys, maxChars){
    if(!text) return;
    const words = String(text).split(' ');
    let lines = ['']; 
    for(const w of words){
      if((lines[lines.length-1]+' '+w).trim().length > maxChars) lines.push(w);
      else lines[lines.length-1] = (lines[lines.length-1]+' '+w).trim();
    }
    lines.slice(0, keys.length).forEach((line,i)=> draw(keys[i], line));
  }

  draw('datum', t.datum);
  draw('tijd', t.tijd);
  draw('locatie_plaats', t.plaats);
  draw('locatie_land', t.land);
  draw('locatie_straat', t.straat);
  if(t.gewonden==='ja') checkX(CHECKBOX_COORDS.gewonden_ja);
  if(t.gewonden==='nee') checkX(CHECKBOX_COORDS.gewonden_nee);
  if(t.materiele_schade_andere_voertuigen==='ja') checkX(CHECKBOX_COORDS.schade_voert_ja);
  if(t.materiele_schade_andere_voertuigen==='nee') checkX(CHECKBOX_COORDS.schade_voert_nee);
  if(t.materiele_schade_andere_objecten==='ja') checkX(CHECKBOX_COORDS.schade_obj_ja);
  if(t.materiele_schade_andere_objecten==='nee') checkX(CHECKBOX_COORDS.schade_obj_nee);

  draw('vn_naam', (vn.naam||vn.voornaam) ? `${vn.naam||''}`.trim() : '');
  draw('vn_voornaam', vn.voornaam);
  draw('vn_adres', vn.adres);
  draw('vn_postcode', vn.postcode);
  draw('vn_plaats', vn.plaats);
  draw('vn_land', vn.land);
  draw('vn_tel', vn.tel);

  draw('merk_type', (k.merk||k.handelsbenaming||k.type) ? `${k.merk||''} ${k.handelsbenaming||k.type||''}`.trim() : '');
  draw('kenteken', k.kenteken);
  draw('land_registratie', k.land||'Nederland');

  draw('verz_naam', v.maatschappij);
  draw('polisnr', v.polisnr);
  draw('groenekaart', v.groenekaart);
  draw('geldig_vanaf', v.van);
  draw('geldig_tot_verz', v.tot);

  draw('best_naam', p.naam);
  draw('best_voornaam', p.voornaam);
  draw('geboortedatum', p.geboortedatum);
  draw('best_adres', p.adres);
  draw('best_postcode', p.postcode);
  draw('best_plaats', p.plaats);
  draw('best_land', p.land);
  draw('best_tel', p.tel);
  draw('rijbewijsnr', p.rijbewijsnr);
  draw('categorie', p.categorie);
  draw('geldigtot_rb', p.geldigtot);

  (t.toedracht_vakjes_A||[]).forEach(n=>{
    const y = TOEDRACHT_CHECKBOX_A.rows[n];
    if(y) checkX({x:TOEDRACHT_CHECKBOX_A.x, y});
  });

  wrapDraw(t.zichtbare_schade_A, ['zichtbare_schade_1','zichtbare_schade_2'], 46);
  wrapDraw(t.opmerkingen, ['opmerkingen_1','opmerkingen_2','opmerkingen_3'], 34);

  // situatieschets
  let schetsGenerated = false;
  if(t.schets && t.schets.mogelijk){
    try{
      const dataUrl = generateSchetsDataUrl(t.schets);
      const pngBytes = Uint8Array.from(atob(dataUrl.split(',')[1]), c=>c.charCodeAt(0));
      const pngImage = await pdfDoc.embedPng(pngBytes);
      const bx = SCHETS_BOX.x0, by = toPdfY(SCHETS_BOX.bottom, 0);
      const bw = SCHETS_BOX.x1-SCHETS_BOX.x0, bh = SCHETS_BOX.bottom-SCHETS_BOX.top;
      page.drawImage(pngImage, { x:bx, y:by, width:bw, height:bh });
      page.drawText('AI-concept — controleer en pas zo nodig aan', {
        x: bx+4, y: by+4, size: 6.5, font, color: rgb(0.71,0.26,0.18)
      });
      schetsGenerated = true;
    }catch(e){ schetsGenerated = false; }
  }

  const outBytes = await pdfDoc.save();
  return { bytes: outBytes, schetsGenerated };
}

  c.querySelector('#print5').addEventListener('click', ()=> window.print());
  c.querySelector('#copy5').addEventListener('click', ()=>{
    const lines = [
      `VOERTUIG A — ${p.naam} ${p.voornaam}`.trim(),
      `Geboortedatum: ${p.geboortedatum||'-'}`,
      `Tel/e-mail: ${p.tel||'-'}`,
      `Rijbewijsnr.: ${p.rijbewijsnr||'-'} (cat. ${p.categorie||'-'}, geldig tot ${p.geldigtot||'-'})`,
      `Adres: ${p.adres||'-'}, ${p.postcode||''} ${p.plaats||''}, ${p.land||''}`,
      ``,
      `Verzekeringnemer: ${vn.naam||'-'} ${vn.voornaam||''}, ${vn.adres||'-'}`,
      ``,
      `Voertuig: ${k.merk||'-'} ${k.handelsbenaming||k.type||''} — kenteken ${k.kenteken||'-'} (${k.land||'Nederland'})`,
      `RDW-check: ${state.kenteken.rdw.status==='ok' ? (state.kenteken.rdw.mismatch?'afwijking gevonden':'bevestigd') : 'niet uitgevoerd'}`,
      ``,
      `Verzekeraar: ${v.maatschappij||'-'}, polis ${v.polisnr||'-'}, groene kaart ${v.groenekaart||'-'}, geldig ${v.van||'-'} t/m ${v.tot||'-'}`,
      ``,
      `Datum/tijd ongeval: ${t.datum||'-'} ${t.tijd||''}`,
      `Locatie: ${t.straat||'-'}, ${t.plaats||''} ${t.land||''}`,
      `Gewonden: ${t.gewonden||'-'} | Schade andere voertuigen: ${t.materiele_schade_andere_voertuigen||'-'} | andere objecten: ${t.materiele_schade_andere_objecten||'-'}`,
      `Vermoedelijke toedrachtvakjes (A): ${(t.toedracht_vakjes_A||[]).join(', ')||'-'}`,
      `Zichtbare schade A: ${t.zichtbare_schade_A||'-'}`,
      `Opmerkingen: ${t.opmerkingen||'-'}`,
      ``,
      b ? `VOERTUIG B — ${b.naam||''} ${b.voornaam||''}, tel ${b.tel||'-'}, kenteken ${b.kenteken||'-'}, verzekeraar ${b.verzekeraar||'-'}\nToedracht B: ${b.toedracht||'-'}` : `VOERTUIG B — nog niet ontvangen`
    ].join('\n');
    navigator.clipboard.writeText(lines).then(()=>{
      c.querySelector('#copy5').textContent = '✓ Gekopieerd';
      setTimeout(()=>{ c.querySelector('#copy5').textContent = '📋 Kopiëren als tekst'; }, 1800);
    });
  });

  return c;
}

/* ================= ROL B: tegenpartij-flow (via QR-link geopend) ================= */
function renderPartnerFlow(){
  let submitted = false;
  const c = el(`
    <div class="card">
      <h2>Je bent uitgenodigd voor een schademelding</h2>
      <p class="desc">De andere bestuurder gebruikt deze app om het Europees schadeformulier samen sneller in te vullen. Vul hieronder jouw kant (Voertuig B) in — dit wordt automatisch teruggestuurd.</p>

      <div class="grid2">
        <div><label class="req">Achternaam</label><input id="bnaam"></div>
        <div><label class="req">Voornaam</label><input id="bvoornaam"></div>
      </div>
      <label class="req">Telefoon of e-mail</label>
      <input id="btel">

      <label>Kentekenbewijs (optioneel — versnelt invullen)</label>
      <div class="upload-box" id="bkbox">
        <div class="icon">🚗</div><div>Tik om foto te kiezen</div>
      </div>
      <input type="file" id="bkfile" accept="image/*" style="display:none">
      <div class="status-line" id="bkstatus"></div>

      <label class="req">Kenteken</label>
      <input id="bkenteken" class="mono">

      <label class="req">Verzekeraar</label>
      <input id="bverzekeraar">

      <label>Kort, in je eigen woorden: wat is er gebeurd?</label>
      <textarea id="btoedracht" rows="4" placeholder="Bijvoorbeeld: ik reed rechtdoor en de andere auto reed achteruit uit een parkeervak op het moment dat ik passeerde."></textarea>

      <div class="row-btns no-print">
        <button class="btn-primary" id="bsubmit" style="flex:1;">Verstuur mijn gegevens →</button>
      </div>
    </div>
  `);

  const bkbox = c.querySelector('#bkbox'), bkfile = c.querySelector('#bkfile');
  bkbox.addEventListener('click', ()=>bkfile.click());
  bkfile.addEventListener('change', async (e)=>{
    const f = e.target.files[0]; if(!f) return;
    const status = c.querySelector('#bkstatus');
    setStatus(status, 'busy', 'Kenteken uitlezen…');
    try{
      const imageBlocks = [{mediaType:f.type||'image/jpeg', data: await fileToBase64(f)}];
      const system = `Lees dit Nederlandse of Belgische kentekenbewijs en geef ALLEEN geldig JSON: {"kenteken":"..."}`;
      const text = await callClaude({system, userContent:"Geef het kenteken.", imageBlocks});
      const data = parseJSONLoose(text);
      if(data && data.kenteken){
        c.querySelector('#bkenteken').value = data.kenteken;
        setStatus(status, 'ok', `Kenteken herkend: ${data.kenteken}`);
      } else throw new Error();
    }catch(e){ setStatus(status, 'err', 'Niet gelukt — vul kenteken handmatig in.'); }
  });

  c.querySelector('#bsubmit').addEventListener('click', async ()=>{
    if(submitted) return;
    const payload = {
      naam: c.querySelector('#bnaam').value,
      voornaam: c.querySelector('#bvoornaam').value,
      tel: c.querySelector('#btel').value,
      kenteken: c.querySelector('#bkenteken').value,
      verzekeraar: c.querySelector('#bverzekeraar').value,
      toedracht: c.querySelector('#btoedracht').value
    };
    if(!payload.naam || !payload.kenteken || !payload.verzekeraar){
      alert("Vul in elk geval naam, kenteken en verzekeraar in.");
      return;
    }
    try{
      await window.storage.set('session:'+incomingSession+':B', JSON.stringify(payload), true);
      submitted = true;
      document.getElementById('app').innerHTML = "";
      document.getElementById('app').appendChild(el(`
        <div class="card partner-thank">
          <div class="big">✅</div>
          <h2>Verstuurd</h2>
          <p class="desc">Je gegevens zijn automatisch toegevoegd aan de schademelding. Je kunt dit venster nu sluiten — de andere bestuurder ziet je gegevens direct op zijn scherm verschijnen.</p>
        </div>
      `));
    }catch(err){
      alert("Versturen mislukt — controleer je internetverbinding en probeer opnieuw.");
    }
  });

  return c;
}

render();
</script>
</body>
</html>
